---
# Tier-1 (LUKS keyslot) and Tier-2 (real boot ordering) Molecule scenarios on the
# Vagrant + libvirt/KVM driver.  These need a KVM-capable runner (nested virt),
# so they are slow and gated on PRs touching role/test code + manual dispatch —
# not every push.  GitHub-hosted ubuntu-latest exposes /dev/kvm.
#
# NOTE: this bootstrap is PROVEN on GitHub-hosted ubuntu-latest — both matrix
# jobs pass with nested KVM (Tier-1 `default` ~4 min, Tier-2 `vm` ~11 min: 2 VMs,
# ZFS-on-LUKS, reboot).  It still cannot be exercised by `act` locally (act
# containers have no nested KVM/libvirtd), so validate changes here via a real
# PR run or `workflow_dispatch`, not `act`.
name: vm-tests

on:
  workflow_dispatch:
  pull_request:
    paths:
      - 'tasks/**'
      - 'templates/**'
      - 'defaults/**'
      - 'handlers/**'
      - 'molecule/default/**'
      - 'molecule/vm/**'
      - '.github/workflows/vm-tests.yml'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  # ansible-compat/molecule git-init a temp dir during prerun; give git a default
  # branch so it does not emit the "using 'master'" advice hint on the runner.
  GIT_CONFIG_COUNT: "1"
  GIT_CONFIG_KEY_0: init.defaultBranch
  GIT_CONFIG_VALUE_0: main

jobs:
  molecule:
    name: "molecule ${{ matrix.scenario }} (libvirt/KVM)"
    runs-on: ubuntu-latest
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        include:
          - scenario: default   # Tier-1: LUKS keyslot on a real virtio disk
          - scenario: vm        # Tier-2: boot ordering, 2 VMs, ZFS-on-LUKS, reboot
    steps:
      - uses: actions/checkout@v5

      - name: Enable unprivileged access to /dev/kvm
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' \
            | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm
          ls -l /dev/kvm

      - name: Install libvirt/KVM + Vagrant + vagrant-libvirt
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            qemu-kvm qemu-utils libvirt-daemon-system libvirt-clients libvirt-dev \
            dnsmasq-base ebtables ruby-dev build-essential \
            genisoimage wamerican
          # Vagrant from HashiCorp's apt repo (distro package lags badly).
          wget -qO- https://apt.releases.hashicorp.com/gpg \
            | sudo gpg --dearmor -o /usr/share/keyrings/hashicorp-archive-keyring.gpg
          echo "deb [signed-by=/usr/share/keyrings/hashicorp-archive-keyring.gpg] \
            https://apt.releases.hashicorp.com $(lsb_release -cs) main" \
            | sudo tee /etc/apt/sources.list.d/hashicorp.list
          sudo apt-get update
          sudo apt-get install -y vagrant
          vagrant plugin install vagrant-libvirt

      - name: Grant the runner rootless libvirt access
        run: |
          sudo systemctl enable --now libvirtd
          sudo usermod -aG libvirt,kvm "$USER"
          # usermod doesn't affect the current shell; grant socket + kvm access
          # directly so molecule can use qemu:///system without a re-login.
          sudo setfacl -m "u:$USER:rw" /var/run/libvirt/libvirt-sock || true
          sudo chmod 0666 /dev/kvm || true

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install Molecule (Vagrant driver)
        run: |
          python -m pip install --upgrade \
            molecule 'molecule-plugins[vagrant]' python-vagrant ansible
          ansible-galaxy collection install ansible.posix community.general

      - name: Install the encrypted_storage_pool consumer (for the vm scenario)
        # The vm Tier-2 composes encrypted_storage_pool (btrfs) as the downstream
        # consumer. Harmless for the default scenario (which doesn't use it).
        run: ansible-galaxy role install -r molecule/vm/requirements.yml -p molecule/vm/roles

      - name: "molecule test -s ${{ matrix.scenario }}"
        env:
          LIBVIRT_DEFAULT_URI: qemu:///system
        run: |
          # molecule-core no longer auto-wires the vagrant driver's modules dir.
          vdir="$(python -c 'import molecule_plugins.vagrant as m; print(m.__file__)')"
          export ANSIBLE_LIBRARY="$(dirname "$vdir")/modules"
          molecule test -s "${{ matrix.scenario }}"
