---
# Set to false to make the role a no-op — useful when the role is included
# unconditionally in an install playbook but encryption is optional per host.
clevis_encryption_enabled: true

# Tang server list.  Must be overridden in group_vars or host_vars.
# Expected shape (matches encrypt-data-disks inventory convention):
#   tang_servers:
#     - url: "https://tang-prod.example.com"
#       route: internal
#     - url: "https://tang-star.example.com"
#       route: external
# tang_servers is intentionally left undefined here so the role fails loudly
# if a caller forgets to supply it, rather than silently producing a broken config.

# Ansible Vault password file on the controller, used to encrypt the recovery
# key that is stored alongside the inventory.
clevis_vault_password_file: "~/.ansible_vault_pass"

# Set to true to keep /tmp/ansible_luks_key on the remote host after
# provisioning completes.  Leave false in production.
clevis_keep_temp_key: false

# ── Boot-time unlock (fail-degraded) ──────────────────────────────────────────
# clevis-unlock-data.service retries Clevis/Tang decryption per disk at boot,
# distinguishing a missing block device from a decrypt failure, and always
# continues so a downstream storage consumer's health check can decide viability.
# Worst-case added boot delay ≈ retries × (attempt_timeout + retry_delay) ×
# number_of_disks (only when disks actually fail every attempt); a healthy disk
# unlocks on the first attempt.  Keep the budget modest so a genuinely-down Tang
# degrades quickly rather than hanging the boot.
clevis_unlock_retries: 3
clevis_unlock_retry_delay: 5
clevis_unlock_attempt_timeout: 20

# Options passed to the underlying `cryptsetup open` when clevis-unlock-data
# opens each data mapper at boot (`clevis luks unlock -o`).  This is the DURABLE
# place to enable discard: the data-disk crypttab entries carry `noauto`, so
# systemd-cryptsetup never opens them and the crypttab `discard` option is inert
# — the mapper only gains allow_discards if it is opened with it here.
#
# --allow-discards passes TRIM/discard through dm-crypt to the NVMe so the storage
# layer's autotrim/discard can reach the device.  dm-crypt workqueue/perf flags
# (--perf-no_read_workqueue etc.) are deliberately NOT included by default: they
# are a storage-tuning concern owned by the proxmox_storage_tuning role.  To make
# them durable at open too, append them here, e.g.:
#   clevis_luks_open_options: "--allow-discards --perf-no_read_workqueue --perf-no_write_workqueue"
# Set to "" to open with no extra options (mapper comes up without discard).
clevis_luks_open_options: "--allow-discards"

# ── DNS servers for provisioning ─────────────────────────────────────────────
# Optional list of nameservers to prepend to /etc/resolv.conf during the
# provisioning run.  Useful when Tang servers are reachable only via an
# internal DNS zone that is not in the host's default resolver config.
# Leave empty (the default) to leave /etc/resolv.conf unchanged.
#
# Example:
#   clevis_dns_servers:
#     - "10.20.20.1"
#     - "10.20.20.2"
clevis_dns_servers: []

# ── Recovery key path ─────────────────────────────────────────────────────────
# Path on the Ansible controller where the vault-encrypted LUKS recovery key is
# stored after a successful provisioning run.  The default follows the standard
# Ansible host_vars layout relative to the inventory directory.
#
# Override this when the role is used outside the standard inventory layout, or
# when you want to store secrets in a separate secrets directory.
#
# Example (flat secrets dir alongside playbook):
#   clevis_recovery_key_path: "{{ playbook_dir }}/secrets/{{ inventory_hostname }}/luks_recovery_key.txt"
clevis_recovery_key_path: "{{ inventory_dir }}/host_vars/{{ inventory_hostname }}/secrets/luks_recovery_key.txt"

# ── Tang connection IP family (IPv4 / IPv6 selection) ─────────────────────────
# Clevis fetches the Tang advertisement (at bind) and POSTs the recovery request
# (at every unlock) using `curl`.  Because clevis invokes curl WITHOUT -q, curl
# reads a config file — so the role pins the IP family for *clevis only* by
# writing a curlrc and pointing curl at it via CURL_HOME (clevis_curl_home).
# This replaces the old host-global gai.conf / disable_ipv6 approach, which was
# silently bypassed by systemd-resolved and disabled IPv6 for the whole host.
#
# Why pin a family at all — curl's Happy Eyeballs races IPv4 and IPv6 at the TCP
# layer and commits to whichever completes the handshake first; it never
# reconsiders based on the HTTP status.  So a dual-stack host whose Tang answers
# the IPv6 TCP handshake (e.g. a load balancer) but returns 403 to non-whitelisted
# IPv6 clients "wins" on IPv6 and then fails — even though IPv4 would have
# returned the advertisement.  Pinning the family that actually yields a valid
# adv is the only reliable fix.
#
#   auto  — (default) at provision time, probe each Tang /adv over IPv4 and IPv6
#           and bake the family that returns a valid advertisement.  Chooses
#           `dual` (no pin) only when every server answers on BOTH families.
#   ipv4  — force --ipv4 for every clevis curl call
#   ipv6  — force --ipv6
#   dual  — pin nothing; rely on curl's own dual-stack / Happy-Eyeballs logic
clevis_curl_ip_version: auto

# Directory used as CURL_HOME for clevis's curl calls; the role writes
# <clevis_curl_home>/.curlrc here and curl reads $CURL_HOME/.curlrc.
clevis_curl_home: /etc/clevis/curl

# Per-server timeouts (seconds) for `auto` reachability probing.
clevis_curl_probe_connect_timeout: 5
clevis_curl_probe_max_time: 15

# DEPRECATED — superseded by clevis_curl_ip_version.  When true (and
# clevis_curl_ip_version is left at its 'auto' default) it is treated as
# clevis_curl_ip_version=ipv4 for backward compatibility, with a deprecation
# warning.  The legacy gai.conf precedence block, the 99-ipv6_disable.conf
# sysctl, and clevis-network-ready.service are removed on every run regardless
# of this flag.
clevis_ipv4_only: false
