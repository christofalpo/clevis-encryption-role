---
# Set to false to make the role a no-op — useful when the role is included
# unconditionally in an install playbook but encryption is optional per host.
clevis_encryption_enabled: true

# Name of the ZFS pool that will be created on top of the encrypted devices.
clevis_pool_name: "data"

# Tang server list.  Must be overridden in group_vars or host_vars.
# Expected shape (matches encrypt-data-disks inventory convention):
#   tang_servers:
#     - url: "https://tang-prod.example.com"
#       route: internal
#     - url: "https://tang-star.example.com"
#       route: external
# tang_servers is intentionally left undefined here so the role fails loudly
# if a caller forgets to supply it, rather than silently producing a broken config.

# Ansible Vault password file on the controller, used to encrypt the recovery
# key that is stored alongside the inventory.
clevis_vault_password_file: "~/.ansible_vault_pass"

# Set to true to keep /tmp/ansible_luks_key on the remote host after
# provisioning completes.  Leave false in production.
clevis_keep_temp_key: false

# Set to true to destroy an existing ZFS pool before (re-)provisioning.
# This is a destructive flag — see destroy-pool.yml.
clevis_destroy_existing: false

# ── ZFS pool topology ─────────────────────────────────────────────────────────
# Controls how discovered data disks are arranged into vdevs.
# Supported values:
#   mirror  — pairs of disks become mirror vdevs (e.g. 6 disks → 3 mirrors).
#             Best for read performance and redundancy.  Requires an even
#             number of disks.
#   raidz   — all disks in a single raidz vdev (1 parity disk).
#   raidz2  — all disks in a single raidz2 vdev (2 parity disks).
#   raidz3  — all disks in a single raidz3 vdev (3 parity disks).
#   stripe  — no redundancy; all disks striped (data loss on any single disk).
clevis_zfs_pool_topology: "mirror"

# ── Proxmox storage registration ─────────────────────────────────────────────
# Set to true to run 'pvesm add zfspool' after pool creation, registering the
# pool as a Proxmox VE storage backend.  Set false when using this role on
# non-Proxmox Debian hosts.
clevis_register_proxmox_storage: false

# ── DNS servers for provisioning ─────────────────────────────────────────────
# Optional list of nameservers to prepend to /etc/resolv.conf during the
# provisioning run.  Useful when Tang servers are reachable only via an
# internal DNS zone that is not in the host's default resolver config.
# Leave empty (the default) to leave /etc/resolv.conf unchanged.
#
# Example:
#   clevis_dns_servers:
#     - "10.20.20.1"
#     - "10.20.20.2"
clevis_dns_servers: []

# ── Recovery key path ─────────────────────────────────────────────────────────
# Path on the Ansible controller where the vault-encrypted LUKS recovery key is
# stored after a successful provisioning run.  The default follows the standard
# Ansible host_vars layout relative to the inventory directory.
#
# Override this when the role is used outside the standard inventory layout, or
# when you want to store secrets in a separate secrets directory.
#
# Example (flat secrets dir alongside playbook):
#   clevis_recovery_key_path: "{{ playbook_dir }}/secrets/{{ inventory_hostname }}/luks_recovery_key.txt"
clevis_recovery_key_path: "{{ inventory_dir }}/host_vars/{{ inventory_hostname }}/secrets/luks_recovery_key.txt"

# Set to true to prefer IPv4 over IPv6 for all getaddrinfo() calls on the
# host and to gate clevis-luks-askpass.service on that preference being
# confirmed at boot.
#
# Specifically, this:
#   1. Writes 'precedence ::ffff:0:0/96  100' to /etc/gai.conf so that
#      getaddrinfo() returns A records before AAAA records for every
#      application (clevis, curl, etc.) — the standard fix for dual-stack
#      hosts where the IPv6 address is assigned before sysctl is applied.
#   2. Deploys clevis-network-ready.service, which verifies both the sysctl
#      flag and the gai.conf entry before clevis-luks-askpass.service starts.
#
# Use this when:
#   - The host has dual-stack connectivity (Hetzner, etc.)
#   - Your Tang servers accept IPv4 connections only
#
# Leave false (the default) for environments where Tang is reachable over IPv6
# or where the network stack is purely IPv4.
clevis_ipv4_only: false
