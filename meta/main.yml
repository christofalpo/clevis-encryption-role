---
galaxy_info:
  role_name: clevis_encryption
  author: kvalitetsit
  description: >
    LUKS2 disk encryption with Clevis/Tang network-bound (NBDE) unlock on Debian.
    Opens the encrypted data disks at boot after the network is up and publishes
    clevis-luks-unlocked.target for a downstream storage consumer to order after.
  license: MIT
  min_ansible_version: "2.14"
  platforms:
    - name: Debian
      versions:
        - trixie
  galaxy_tags:
    - luks
    - encryption
    - proxmox
    - clevis
    - tang
    - security

# No hard role dependencies: the role installs its own packages and is
# designed to be composable alongside (not after) proxmox-install.
# Callers that need a specific ordering should use include_role in their
# play tasks section with explicit sequencing.
dependencies: []
