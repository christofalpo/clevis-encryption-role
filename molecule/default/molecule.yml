---
dependency:
  name: galaxy

driver:
  name: docker

platforms:
  - name: clevis-encryption-debian13
    image: geerlingguy/docker-debian13-ansible:latest
    pre_build_image: true
    privileged: true
    cgroupns_mode: host
    volumes:
      - /sys/fs/cgroup:/sys/fs/cgroup:rw
    command: /lib/systemd/systemd
    # The container needs /dev/loop* and /dev/mapper/* for LUKS/dm-crypt.
    # These are created by the prepare playbook using losetup + cryptsetup.
    devices:
      - /dev/loop-control:/dev/loop-control
    capabilities:
      - SYS_ADMIN
      - NET_ADMIN
      - MKNOD
    tmpfs:
      - /run
      - /run/lock
      - /tmp

provisioner:
  name: ansible
  config_options:
    defaults:
      interpreter_python: auto_silent
  inventory:
    host_vars:
      clevis-encryption-debian13:
        # Pre-set the disk list so the discovery task is skipped.
        # The prepare playbook creates /dev/loop0 as a LUKS2 device.
        clevis_raw_disks:
          - loop0
        # Use a path inside the container so the delegate_to: localhost tasks
        # write to the Molecule temp directory rather than a real inventory.
        clevis_recovery_key_path: "/tmp/molecule_recovery_key.txt"
        # Tang server is mocked — provisioning block is skipped because the
        # recovery key file is pre-created by the prepare playbook.
        tang_servers:
          - url: "http://127.0.0.1:7500"
        clevis_ipv4_only: true
        clevis_register_proxmox_storage: false
        clevis_vault_password_file: "/dev/null"
        # Skip ensure-pool: the container has no usable ZFS kernel module, and
        # this scenario only tests the boot-ordering block.
        clevis_ensure_pool: false

verifier:
  name: ansible
