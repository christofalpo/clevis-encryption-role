---
# Post-REBOOT assertions for the Tier-2 VM boot-ordering test.  These observe the
# REAL systemd boot chain (boot 2), not the provisioning run.
#
# What a green run proves end-to-end:
#   - the data disks were unlocked at boot by clevis-unlock-data via the EXTERNAL
#     Tang (clevis-tang VM) over the network — only possible after
#     network-online.target;
#   - the decoupled import -> pool-check -> ready.target chain ran to completion;
#   - allow_discards survived the reboot (durable open, not just the live-apply);
#   - the ZFS mirror imported and is healthy.
- name: "Verify boot-time clevis/Tang unlock + boot ordering (post-reboot)"
  hosts: clevis-target
  become: true
  gather_facts: false

  tasks:
    - name: "Assert encrypted-storage-ready.target reached (the boot barrier)"  # noqa: command-instead-of-module
      # is-active is a read-only query; the systemd module cannot assert it, and
      # for oneshot RemainAfterExit units service_facts misreports "stopped".
      ansible.builtin.command: systemctl is-active encrypted-storage-ready.target
      register: _ready
      changed_when: false
      failed_when: _ready.stdout != "active"

    - name: "Assert clevis-luks-unlocked.target is active (public NBDE sync point)"  # noqa: command-instead-of-module
      ansible.builtin.command: systemctl is-active clevis-luks-unlocked.target
      register: _unlocked
      changed_when: false
      failed_when: _unlocked.stdout != "active"

    - name: "Read this boot's journal for clevis-luks-unlocked.target"  # noqa: command-instead-of-module
      ansible.builtin.command: journalctl -b -u clevis-luks-unlocked.target --no-pager
      register: _unlocked_journal
      changed_when: false

    - name: "Assert systemd EMITTED the 'Reached target' signal this boot"
      # The real proof of the seam: systemd actually reached the target during the
      # (post-reboot) boot transaction — not merely that it is active now. The
      # 'Reached target …' line is systemd's activation signal for the unit.
      ansible.builtin.assert:
        that: "'Reached target' in _unlocked_journal.stdout"
        fail_msg: >-
          systemd did not log 'Reached target' for clevis-luks-unlocked.target
          this boot. Journal was: {{ _unlocked_journal.stdout }}
        success_msg: "systemd reached clevis-luks-unlocked.target this boot."

    - name: "Read boot-activation timestamps for the unlock ordering chain"  # noqa: command-instead-of-module
      # ActiveEnterTimestampMonotonic = µs since boot when the unit became active
      # (0 => never activated). Same clock across units, so directly comparable.
      ansible.builtin.command: >-
        systemctl show -p ActiveEnterTimestampMonotonic --value {{ item }}
      loop:
        - clevis-unlock-data.service
        - clevis-luks-unlocked.target
        - encrypted-storage-import.service
      register: _seam_ts
      changed_when: false
      loop_control:
        label: "{{ item }}"

    - name: "Assert the seam ORDERING held at boot (unlock-data <= target <= import)"
      # Proves the After= ordering actually took effect: the target was reached
      # AFTER the unlock service ran, and the consumer ran AFTER the target — the
      # exact contract a split-out storage-pool consumer will depend on.
      vars:
        _u: "{{ _seam_ts.results[0].stdout | int }}"
        _t: "{{ _seam_ts.results[1].stdout | int }}"
        _i: "{{ _seam_ts.results[2].stdout | int }}"
      ansible.builtin.assert:
        that:
          - (_u | int) > 0
          - (_t | int) > 0
          - (_i | int) > 0
          - (_u | int) <= (_t | int)
          - (_t | int) <= (_i | int)
        fail_msg: >-
          Seam ordering broken (ActiveEnterTimestampMonotonic µs):
          clevis-unlock-data={{ _u }}, clevis-luks-unlocked.target={{ _t }},
          encrypted-storage-import={{ _i }} — expected all >0 and non-decreasing.
        success_msg: >-
          Seam ordering OK: unlock-data({{ _u }}) <= unlocked.target({{ _t }})
          <= import({{ _i }}) µs.

    - name: "Assert unlock + import + pool-check services all succeeded"  # noqa: command-instead-of-module
      ansible.builtin.command: "systemctl is-active {{ item }}"
      loop:
        - clevis-unlock-data.service
        - encrypted-storage-import.service
        - encrypted-storage-pool-check.service
      register: _svc
      changed_when: false
      failed_when: _svc.stdout != "active"
      loop_control:
        label: "{{ item }}"

    - name: "Assert both data mappers are open after boot"
      ansible.builtin.command: "cryptsetup status crypt-{{ item }}"
      loop: [vdb, vdc]
      changed_when: false
      loop_control:
        label: "crypt-{{ item }}"

    - name: "Assert allow_discards is durable across the reboot on each mapper"
      ansible.builtin.command: "dmsetup table crypt-{{ item }}"
      loop: [vdb, vdc]
      register: _dm
      changed_when: false
      failed_when: "'allow_discards' not in _dm.stdout"
      loop_control:
        label: "crypt-{{ item }}"

    - name: "Assert the ZFS pool imported and is healthy"
      ansible.builtin.command: "zpool list -H -o health {{ clevis_pool_name | default('data') }}"
      register: _health
      changed_when: false
      failed_when: _health.stdout not in ['ONLINE', 'DEGRADED']

    - name: "Assert the boot unlock happened (clevis-unlock-data unlocked the disks)"
      ansible.builtin.command: journalctl -b -u clevis-unlock-data.service --no-pager
      register: _journal
      changed_when: false
      failed_when: "'unlocked' not in _journal.stdout"

    - name: "PASS"
      ansible.builtin.debug:
        msg: >-
          Tier-2 VM boot-ordering test PASSED — both data disks unlocked at boot
          from the external Tang, allow_discards durable across reboot, pool
          {{ _health.stdout }}, encrypted-storage-ready.target active.
