---
# Disk-SET systemd boot ordering for the encrypted ZFS pool.  Factored out of
# main.yml so replace-disk.yml can refresh it after the disk set changes.
#
# Two halves:
#   UNLOCK (always) — the NBDE unlock service + the clevis-luks-askpass network
#     gate + the PUBLIC clevis-luks-unlocked.target seam. clevis always owns these.
#   STORAGE (clevis_deploy_storage_units, default true) — the ZFS import ->
#     pool-check -> encrypted-storage-ready.target chain, extracted to
#     storage-boot-ordering.yml. Set the flag false when a separate storage-pool
#     role (e.g. proxmox_encrypted_storage) owns those units, so clevis and that
#     role don't both write the same files.
#
# FAIL-DEGRADED, and DECOUPLED from the stock early zfs-import machinery.
#
# The stock zfs-import-scan/zfs-import-cache services run EARLY (ordered Before
# zfs-import.target -> zfs-mount.service -> local-fs.target).  Making them wait
# for the network (needed for Clevis/Tang) creates a systemd ordering cycle
# (local-fs -> zfs-mount -> zfs-import -> [our net dep] -> network-online ->
# networking -> local-fs).  systemd breaks such a cycle by DELETING a job — in
# practice it deleted clevis-unlock-data, so nothing decrypted and no pool came
# up.  So we DO NOT touch zfs-import-scan; the encrypted data pool is handled by
# a self-contained LATE chain that only multi-user.target / pvestatd pull in:
#
#   network-online.target
#     -> clevis-unlock-data.service        retry Tang per disk; MISSING DEVICE vs
#                                          DECRYPT FAILURE; always exit 0
#     -> clevis-luks-unlocked.target       PUBLIC seam (unlock has run)
#     -> encrypted-storage-import.service  zpool import -d /dev/mapper cachefile=none
#     -> encrypted-storage-pool-check.svc  health ONLINE|DEGRADED -> ok, else fail
#     -> encrypted-storage-ready.target    the barrier (pvestatd/pve-guests gate on it)
#
# Nothing early (local-fs, zfs-import.target, basic.target) depends on this
# chain, so there is no cycle.  Idempotent and safe on already-encrypted nodes.

# NOTE: an EARLIER version of this role wrote a networking.service early bring-up
# drop-in (networking.service.d/10-override.conf) that was validated to BREAK boot.
# This role no longer writes it.  It is now removed by tasks/cleanup-legacy.yml —
# but CONTENT-GUARDED: because '10-override.conf' is a generic name in another
# service's drop-in directory, cleanup deletes it only when its content carries
# this role's distinctive ordering line (or ownership header), never blindly.

# ── clevis-luks-askpass network gate (belt-and-suspenders) ──────────────────
- name: "Create systemd drop-in directory for clevis-luks-askpass"
  ansible.builtin.file:
    path: /etc/systemd/system/clevis-luks-askpass.service.d
    state: directory
    mode: '0755'
    owner: root
    group: root

- name: "Wait for network-online before clevis-luks-askpass attempts Tang"
  ansible.builtin.copy:
    dest: /etc/systemd/system/clevis-luks-askpass.service.d/network-online.conf
    owner: root
    group: root
    mode: '0644'
    content: |
      # Managed by Ansible role: clevis_encryption — https://github.com/KvalitetsIT/clevis-encryption-role
      # Do not edit by hand; regenerated on each role run.
      [Unit]
      After=network-online.target
      Wants=network-online.target
  notify: "Reload systemd daemon"

# ── 1. Retry-driven, fail-degraded unlock ───────────────────────────────────
- name: "Deploy fail-degraded Clevis unlock script"
  ansible.builtin.template:
    src: clevis-unlock-data.sh.j2
    dest: /usr/local/sbin/clevis-unlock-data
    owner: root
    group: root
    mode: '0755'

- name: "Deploy clevis-unlock-data.service"
  ansible.builtin.copy:
    dest: /etc/systemd/system/clevis-unlock-data.service
    owner: root
    group: root
    mode: '0644'
    content: |
      # Managed by Ansible role: clevis_encryption — https://github.com/KvalitetsIT/clevis-encryption-role
      # Do not edit by hand; regenerated on each role run.
      [Unit]
      Description=Unlock Clevis/Tang LUKS data disks (fail-degraded, with retries)
      Documentation=file:///usr/local/sbin/clevis-unlock-data
      After=network-online.target
      Wants=network-online.target
      # NOTE: no [Install] and not ordered Before any early target — pulled in by
      # clevis-luks-unlocked.target (Requires/After).  Keeping it OUT of
      # zfs-import.target is what avoids the ordering cycle.

      [Service]
      Type=oneshot
      RemainAfterExit=yes
      ExecStart=/usr/local/sbin/clevis-unlock-data
      TimeoutStartSec={{ (clevis_unlock_retries | int)
                         * (clevis_unlock_attempt_timeout | int + clevis_unlock_retry_delay | int)
                         * (clevis_raw_disks | length | int) + 120 }}
  notify: "Reload systemd daemon"

# ── 1b. Public unlock sync point (the storage-consumer contract) ─────────────
# The STABLE name any downstream storage consumer (the ZFS import chain in
# storage-boot-ordering.yml today; a separate storage-pool role tomorrow) should
# order After=/Wants= to run after NBDE unlock — so consumers never hard-code the
# internal clevis-unlock-data.service name.  Reached once the fail-degraded unlock
# step has RUN (clevis-unlock-data always exits 0; a partial unlock still reaches
# this target).  "Storage is actually assembled + healthy" is a stronger property
# owned by the consumer's own barrier (e.g. encrypted-storage-ready).
- name: "Deploy clevis-luks-unlocked.target (public unlock sync point)"
  ansible.builtin.copy:
    dest: /etc/systemd/system/clevis-luks-unlocked.target
    owner: root
    group: root
    mode: '0644'
    content: |
      # Managed by Ansible role: clevis_encryption — https://github.com/KvalitetsIT/clevis-encryption-role
      # Do not edit by hand; regenerated on each role run.
      [Unit]
      Description=Clevis/Tang LUKS data disks unlocked (public sync point)
      Documentation=man:systemd.special(7)
      Requires=clevis-unlock-data.service
      After=clevis-unlock-data.service

      [Install]
      WantedBy=multi-user.target
  notify: "Reload systemd daemon"

# ── 2-4. The encrypted-storage import chain (ZFS consumer) ──────────────────
# Extracted to storage-boot-ordering.yml and gated: skip when a separate
# storage-pool role owns these units (avoids two roles writing the same files).
# The UNLOCK half + clevis-luks-unlocked.target above are ALWAYS deployed.
- name: "Deploy the encrypted-storage import chain (skip when a storage-pool role owns it)"
  ansible.builtin.include_tasks: storage-boot-ordering.yml
  when: clevis_deploy_storage_units | default(true) | bool

- name: "Enable the unlock sync point + clevis-luks-askpass.path"
  ansible.builtin.systemd:
    name: "{{ item }}"
    enabled: true
  loop:
    - clevis-luks-unlocked.target
    - clevis-luks-askpass.path
  ignore_errors: "{{ ansible_check_mode }}"

- name: "Flush handlers (daemon_reload) before continuing"
  ansible.builtin.meta: flush_handlers
