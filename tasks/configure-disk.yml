---
# Configures boot-time integration for a single encrypted data disk:
#   - /etc/crypttab entry with correct network-ordering flags
#   - Live discard passthrough applied to running mapper (no reboot needed)
#
# Called from tasks/main.yml inside the boot-ordering block, once per disk via
# include_tasks loop.  The loop variable is disk_device (bare name, e.g. nvme0n1).
#
# Disk-independent systemd drop-ins (clevis-luks-askpass network gate,
# zfs-import-cache ordering) are written once in main.yml after this loop —
# they must not live here as they would be applied redundantly for every disk.
#
# Idempotent: lineinfile (with regexp) replaces any existing crypttab entry for
# this device regardless of its current flags; cryptsetup refresh is only called
# when the mapper is open and discard is not already active.  The raw device
# does not need to be open — only blkid is called against it to read the UUID.
#
# The crypttab task notifies "Rebuild initramfs" so the initrd stays consistent
# with /etc/crypttab (clevis-initramfs bakes a copy of crypttab into the initrd).
# For _netdev data disks the initramfs phase skips these entries anyway, so a
# stale initrd causes no functional breakage — but consistency is worth keeping.
#
# Reboot note:
#   Discard is applied to the running mapper immediately (cryptsetup refresh).
#   New crypttab flags take effect at next boot.
#   dm-crypt workqueue and CPU-pinning tuning belong in proxmox-storage-tuning
#   and may require a scheduled maintenance reboot.

- name: "Read UUID from device: {{ disk_device }}"
  ansible.builtin.command: blkid -s UUID -o value "/dev/{{ disk_device }}"
  register: disk_uuid
  changed_when: false
  check_mode: false

- name: "Write /etc/crypttab entry for: {{ disk_device }}"
  ansible.builtin.lineinfile:
    path: /etc/crypttab
    # regexp matches the mapper name at the start of the line so any existing
    # entry for this device is replaced rather than duplicated.  Without this,
    # re-running on a node with an older entry (different flags, old noauto style)
    # would append a second line for the same device.
    regexp: "^crypt-{{ disk_device }}\\s"
    # Flags explained:
    #   _netdev       — tells systemd this unit needs network; places the unit in
    #                   remote-cryptsetup.target and adds After=network.target.
    #   x-systemd.after=network-online.target
    #                 — strengthens ordering to full routed connectivity, which is
    #                   required for the HTTPS tang unlock to succeed.
    #                   Replaces the old noauto flag (noauto removed the unit from
    #                   remote-cryptsetup.target entirely, stripping all network
    #                   ordering and causing 600+ failed tang attempts before the
    #                   link was up).
    #   noauto        - don't try to decrypt before something (ZFS) specifically
    #                   calls for it.
    #   nofail        — boot continues even if unlock times out (tang offline).
    #   discard       — passes TRIM/discard through to the NVMe for wear-levelling.
    line: "crypt-{{ disk_device }} UUID={{ disk_uuid.stdout }} none luks,discard,noauto,nofail,_netdev,x-systemd.after=network-online.target"
    create: true
    mode: '0600'
    owner: root
    group: root
  notify: "Rebuild initramfs"

# ── Live discard passthrough ──────────────────────────────────────────────────
# The crypttab entry above ensures discard is enabled at next boot.
# This block applies it immediately to the running mapper so the effect is
# not deferred until the next maintenance reboot.
#
# cryptsetup refresh re-applies flags to an open dm-crypt device without
# interrupting I/O or closing the mapper.  It is safe to call on a live
# production system with active ZFS workloads.
#
# Note: ansible.builtin.stat misreports symlinks-to-block-devices in
# /dev/mapper/ as absent, so we use 'cryptsetup status' (rc=0 if open,
# non-zero if not) to determine whether the mapper is currently active.

- name: "Read active flags from running mapper: {{ disk_device }}"
  # 'cryptsetup status' reports the live dm-crypt device flags (e.g. 'discards')
  # for the currently open mapper.  rc=0 means the device is active; non-zero
  # means it is not open (device absent or not yet unlocked).
  # check_mode: false — read-only probe, safe to run unconditionally.
  ansible.builtin.command: cryptsetup status "crypt-{{ disk_device }}"
  register: _mapper_status
  changed_when: false
  failed_when: false
  check_mode: false

- name: "Apply discard passthrough to running mapper: {{ disk_device }}"
  # Reloads the live dm-crypt device table to add allow_discards using dmsetup
  # rather than 'cryptsetup refresh --token-only'.  The device is already open
  # and the volume key is already in the kernel keyring; dmsetup reload reuses
  # the existing keyring reference without any Tang/Clevis authentication round-
  # trip.  This avoids the Tang dependency that causes 'cryptsetup refresh
  # --token-only' to fail silently when Tang is temporarily unreachable.
  #
  # Steps: read current table (key shown as ":N:logon:cryptsetup:UUID" keyring
  # ref), increment the optional-param count, append allow_discards, then
  # suspend → reload → resume (same sequence cryptsetup refresh uses internally;
  # the suspend is sub-millisecond and safe on live ZFS workloads).
  #
  # Persistence is handled by the crypttab 'discard' flag written above.
  # Idempotent: skipped when 'discards' is already in the active mapper flags.
  ansible.builtin.shell:
    cmd: |
      set -o pipefail
      TABLE=$(dmsetup table --showkeys "crypt-{{ disk_device }}")
      FIXED=$(echo "$TABLE" | awk '{print $1,$2,$3,$4,$5,$6,$7,$8}')
      OPTCNT=$(echo "$TABLE" | awk '{print (NF>8) ? $9+1 : 1}')
      OPTS=$(echo "$TABLE" | awk '{if(NF>9){for(i=10;i<=NF;i++) printf "%s ",$i}}')
      dmsetup suspend "crypt-{{ disk_device }}"
      dmsetup reload  "crypt-{{ disk_device }}" --table "$FIXED $OPTCNT ${OPTS}allow_discards"
      dmsetup resume  "crypt-{{ disk_device }}"
    executable: /bin/bash
  when:
    - _mapper_status.rc == 0
    - "'discards' not in _mapper_status.stdout"
  changed_when: true
