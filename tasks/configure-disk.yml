---
# Configures boot-time integration for a single encrypted data disk:
#   - /etc/crypttab entry with correct network-ordering flags
#   - Live discard passthrough applied to running mapper (no reboot needed)
#
# Called from tasks/main.yml inside the boot-ordering block, once per disk via
# include_tasks loop.  The loop variable is disk_device (bare name, e.g. nvme0n1).
#
# Disk-independent systemd drop-ins (clevis-luks-askpass network gate, the
# clevis-unlock-data service + clevis-luks-unlocked.target) are written once in
# main.yml after this loop — not here, where they would be redundant per disk.
#
# Idempotent: lineinfile (with regexp) replaces any existing crypttab entry for
# this device regardless of its current flags; cryptsetup refresh is only called
# when the mapper is open and discard is not already active.  The raw device
# does not need to be open — only blkid is called against it to read the UUID.
#
# The crypttab task notifies "Rebuild initramfs" so the initrd stays consistent
# with /etc/crypttab (clevis-initramfs bakes a copy of crypttab into the initrd).
# For _netdev data disks the initramfs phase skips these entries anyway, so a
# stale initrd causes no functional breakage — but consistency is worth keeping.
#
# Reboot note:
#   Discard is applied to the running mapper immediately (cryptsetup refresh).
#   Across reboots, discard persists because clevis-unlock-data opens each
#   mapper with {{ clevis_luks_open_options }} (--allow-discards) — NOT via the
#   crypttab 'discard' option, which is inert for these noauto disks (systemd
#   never opens them; clevis-unlock-data does).
#   dm-crypt workqueue and CPU-pinning tuning belong in proxmox-storage-tuning
#   and may require a scheduled maintenance reboot.

- name: "Read UUID from device: {{ disk_device }}"
  ansible.builtin.command: blkid -s UUID -o value "/dev/{{ disk_device }}"
  register: disk_uuid
  changed_when: false
  check_mode: false

- name: "Write /etc/crypttab entry for: {{ disk_device }}"
  ansible.builtin.lineinfile:
    path: /etc/crypttab
    # regexp matches the mapper name at the start of the line so any existing
    # entry for this device is replaced rather than duplicated.  Without this,
    # re-running on a node with an older entry (different flags, old noauto style)
    # would append a second line for the same device.
    regexp: "^crypt-{{ disk_device }}\\s"
    # Flags explained:
    #   _netdev       — tells systemd this unit needs network; places the unit in
    #                   remote-cryptsetup.target and adds After=network.target.
    #   x-systemd.after=network-online.target
    #                 — strengthens ordering to full routed connectivity, which is
    #                   required for the HTTPS tang unlock to succeed.
    #                   Replaces the old noauto flag (noauto removed the unit from
    #                   remote-cryptsetup.target entirely, stripping all network
    #                   ordering and causing 600+ failed tang attempts before the
    #                   link was up).
    #   noauto        - don't decrypt in early boot; clevis-unlock-data opens
    #                   these disks in the booted system, after network-online.
    #   nofail        — boot continues even if unlock times out (tang offline).
    #   discard       — passes TRIM/discard through to the NVMe for wear-levelling.
    line: "crypt-{{ disk_device }} UUID={{ disk_uuid.stdout }} none luks,discard,noauto,nofail,_netdev,x-systemd.after=network-online.target"
    create: true
    mode: '0600'
    owner: root
    group: root
  notify: "Rebuild initramfs"

# ── Live discard passthrough ──────────────────────────────────────────────────
# Persistence across reboots is handled by clevis-unlock-data opening the mapper
# with --allow-discards (see clevis_luks_open_options); the crypttab 'discard'
# option does NOT achieve it here because these disks are noauto.  This block
# applies discard immediately to the already-open mapper so the effect is not
# deferred until the next reboot.
#
# cryptsetup refresh re-applies flags to an open dm-crypt device without
# interrupting I/O or closing the mapper.  It is safe to call on a live
# production system with active storage workloads.
#
# Note: ansible.builtin.stat misreports symlinks-to-block-devices in
# /dev/mapper/ as absent, so we use 'cryptsetup status' (rc=0 if open,
# non-zero if not) to determine whether the mapper is currently active.

- name: "Read active flags from running mapper: {{ disk_device }}"
  # 'cryptsetup status' reports the live dm-crypt device flags (e.g. 'discards')
  # for the currently open mapper.  rc=0 means the device is active; non-zero
  # means it is not open (device absent or not yet unlocked).
  # check_mode: false — read-only probe, safe to run unconditionally.
  ansible.builtin.command: cryptsetup status "crypt-{{ disk_device }}"
  register: _mapper_status
  changed_when: false
  failed_when: false
  check_mode: false

- name: "Apply discard passthrough to running mapper: {{ disk_device }}"
  # Enables allow_discards on the open mapper without a reboot via
  # 'cryptsetup refresh', fed by the device's own Clevis binding.
  #
  # NOT raw 'dmsetup reload' (the previous approach): a standalone dmsetup
  # process cannot resolve the LUKS2 volume key — cryptsetup links it into the
  # OPENING process's kernel keyring possessor-scoped, so dmsetup reload fails
  # "device-mapper: reload ioctl failed: Required key not available" and silently
  # leaves allow_discards unset (proven across 6 VM runs).  cryptsetup IS the
  # possessor when it re-derives the key, so 'refresh' succeeds.  The passphrase
  # is recovered from Clevis (purpose-built `clevis luks pass -s`, falling back
  # to decrypting the LUKS2 Clevis token JWE) and piped DIRECTLY into
  # --key-file - (no command substitution, to preserve the exact key bytes).
  #
  # Only discard is applied here; dm-crypt perf flags are proxmox_storage_tuning's
  # concern.  Honest: verifies allow_discards landed in the live dm table and
  # fails loudly if Clevis recovery did not work (it then activates on next boot
  # via clevis-unlock-data).
  # Idempotent: skipped when 'discards' is already in the active mapper flags.
  ansible.builtin.shell:
    cmd: |
      set -uo pipefail
      NAME="crypt-{{ disk_device }}"
      DEV="/dev/{{ disk_device }}"
      applied=""

      slot=$(clevis luks list -d "$DEV" 2>/dev/null | head -1 | cut -d: -f1 | tr -d ' ')
      if [ -n "$slot" ]; then
        if clevis luks pass -d "$DEV" -s "$slot" 2>/dev/null \
             | cryptsetup refresh --allow-discards --key-file - "$NAME" 2>/dev/null; then
          applied="clevis-pass(slot $slot)"
        fi
      fi
      if [ -z "$applied" ]; then
        tid=$(cryptsetup luksDump "$DEV" 2>/dev/null \
              | awk -F: '/^[[:space:]]+[0-9]+: clevis/{gsub(/[^0-9]/,"",$1); print $1; exit}')
        if [ -n "$tid" ]; then
          if cryptsetup token export --token-id "$tid" "$DEV" 2>/dev/null \
               | jose fmt -j- -Og jwe -o- 2>/dev/null \
               | jose jwe fmt -i- -c 2>/dev/null \
               | clevis decrypt 2>/dev/null \
               | cryptsetup refresh --allow-discards --key-file - "$NAME" 2>/dev/null; then
            applied="clevis-token(id $tid)"
          fi
        fi
      fi

      if dmsetup table "$NAME" 2>/dev/null | grep -q allow_discards; then
        echo "discard enabled on $NAME${applied:+ via $applied}"
        exit 0
      fi
      echo "could not enable live discard on $NAME (Clevis recovery failed); it activates on next boot via clevis-unlock-data" >&2
      exit 1
    executable: /bin/bash
  environment:
    PATH: "/usr/sbin:/usr/bin:/sbin:/bin"
    # clevis-decrypt-tang curls the recovery endpoint; pin the IP family.
    CURL_HOME: "{{ clevis_curl_home }}"
  when:
    - _mapper_status.rc == 0
    - "'discards' not in _mapper_status.stdout"
  changed_when: true
