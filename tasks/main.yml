---
# Entry point for the clevis-encryption role.
#
# Orchestrates the full lifecycle in three phases:
#
#   PRESTAGE  (tag: prestage; idempotent and safe on un-encrypted nodes)
#     Installs encryption packages, applies Tang network preconditions
#     (DNS, IPv6 sysctl when clevis_ipv4_only=true, gai.conf gate).
#     Run on its own with --tags prestage to do this work ahead of the
#     actual encryption window.
#
#   BLOCK: provisioning  (when: recovery key does not yet exist on controller)
#     Generates a DR passphrase, fetches Tang advertisements, formats and
#     binds all data disks with LUKS2/Clevis, then creates the ZFS pool and
#     registers it with Proxmox.  The temporary key is always removed from
#     the remote host via the block's always: handler, even on failure.
#
#   BLOCK: boot ordering  (tag: systemd; always runs, idempotent)
#     Writes /etc/crypttab entries and systemd drop-ins that ensure the
#     correct unlock → pool-import sequence on every boot.  Safe to run
#     against already-encrypted nodes.
#
# Key variables (all have defaults in defaults/main.yml except tang_servers):
#   clevis_encryption_enabled  — set false to skip the entire role
#   clevis_pool_name           — ZFS pool name
#   tang_servers               — must be set in group_vars / host_vars
#   clevis_vault_password_file — vault password file on the controller
#   clevis_keep_temp_key       — retain /tmp/ansible_luks_key (debug only)
#   clevis_destroy_existing    — destroy existing pool before provisioning

- name: "Skip: clevis_encryption_enabled is false"
  ansible.builtin.debug:
    msg: "clevis-encryption role skipped on {{ inventory_hostname }}"
  when: not (clevis_encryption_enabled | default(true) | bool)

- name: "Run clevis-encryption role"
  when: clevis_encryption_enabled | default(true) | bool
  block:

    # ── PRESTAGE ────────────────────────────────────────────────────────────
    # Pre-stageable tasks: package install + Tang network preconditions.
    # Tagged 'prestage' so the operator can run this work ahead of time on
    # nodes that haven't yet had disk encryption provisioned, shortening the
    # maintenance window for the destructive LUKS-format step.
    # Also runs as part of a full (no-tag) invocation so first-run behaviour
    # is unchanged.

    - name: "Prestage: packages + Tang network preconditions"
      ansible.builtin.include_tasks: prestage.yml
      tags: [prestage]

    # ── PRE-FLIGHT ──────────────────────────────────────────────────────────
    # These tasks always run.  They establish the facts needed by both the
    # provisioning and boot-ordering blocks.

    - name: "Check whether recovery key already exists on controller"
      ansible.builtin.stat:
        path: "{{ clevis_recovery_key_path }}"
      register: clevis_recovery_key_stat
      delegate_to: localhost
      become: false
      check_mode: false

    - name: "Discover raw physical data disks (largest size group)"
      # Filters out removable, virtual, and already-mapped devices, then groups
      # by size and selects the largest group — the data disks.
      # tags: always — this fact is consumed by both the provisioning and
      # systemd blocks; without it the --tags systemd path has no disk list.
      # when: not defined — allows Molecule (and other test harnesses) to
      # pre-set clevis_raw_disks via vars without triggering ansible_devices
      # inspection, which cannot work reliably in a container environment.
      tags: always
      when: clevis_raw_disks is not defined
      ansible.builtin.set_fact:
        clevis_raw_disks: "{{ (query_logic | from_json | last).disks }}"
      vars:
        query_logic: >-
          {% set results = [] %}
          {% set filtered = ansible_devices | dict2items
             | selectattr('value.removable', 'equalto', '0')
             | rejectattr('key', 'match', '^(loop|sr|dm-|nbd|md|luks-|crypt)') | list %}
          {% for size, items in filtered | groupby('value.size') | sort(attribute='1.0.value.sectors') %}
            {% set total = (items[0].value.sectors | int) * (items[0].value.host_sectorsize | default(512) | int) %}
            {% set _ = results.append({
                'size': size, 'size_bytes': total | int,
                'disks': items | map(attribute='key') | list | sort
            }) %}
          {% endfor %}
          {{ results | to_json }}
      check_mode: false

    # ── BLOCK: PROVISIONING ─────────────────────────────────────────────────
    # Skipped entirely when the recovery key vault file already exists on the
    # controller — that file is created at the end of a successful first run,
    # so its presence means the node was already provisioned.
    #
    # The always: section guarantees the temporary key is removed from the
    # remote host even if any provisioning task fails midway.

    - name: "Provision disk encryption"
      when: not clevis_recovery_key_stat.stat.exists
      tags: [provision]
      block:

        # --- Recovery key -------------------------------------------------------
        - name: "Ensure host secrets directory exists on controller"
          ansible.builtin.file:
            path: "{{ clevis_recovery_key_path | dirname }}"
            state: directory
            mode: '0700'
          delegate_to: localhost
          become: false

        - name: "Generate 8-word DR passphrase (TitleCase, 4-10 chars per word)"
          ansible.builtin.shell: |
            grep -E '^[a-z]{4,10}$' /usr/share/dict/words | shuf -n 8 \
              | awk '{print toupper(substr($0,1,1)) substr($0,2)}' | paste -sd '-'
          register: clevis_passphrase_raw
          delegate_to: localhost
          become: false
          check_mode: false
          no_log: true

        - name: "Store passphrase as play-scoped fact"
          ansible.builtin.set_fact:
            clevis_passphrase: "{{ clevis_passphrase_raw.stdout }}"
          no_log: true

        - name: "Write clear-text recovery key to controller (pre-vault)"
          ansible.builtin.copy:
            content: "{{ clevis_passphrase }}"
            dest: "{{ clevis_recovery_key_path }}"
            mode: '0600'
          delegate_to: localhost
          become: false
          no_log: true

        - name: "Vault-encrypt recovery key on controller"
          ansible.builtin.command: >
            ansible-vault encrypt
            {{ clevis_recovery_key_path }}
            --vault-password-file {{ clevis_vault_password_file }}
          delegate_to: localhost
          become: false

        # Network preconditions for Tang (DNS, IPv6 sysctl, gai.conf gate) are
        # handled by tasks/prestage.yml above — runs unconditionally on every
        # full-role invocation, so by the time we reach this point the host is
        # already configured to talk to the Tang servers correctly.

        # --- Tang advertisement fetch and SSS assembly ------------------------
        - name: "Fetch advertisement keys from Tang servers"
          ansible.builtin.uri:
            url: "{{ item }}/adv"
            return_content: true
            status_code: 200
            body_format: json
          loop: "{{ tang_servers | map(attribute='url') }}"
          register: clevis_tang_adv
          until: clevis_tang_adv is not failed
          retries: 3
          delay: 5
          check_mode: false

        - name: "Assemble Clevis SSS configuration (t=1 of N)"
          ansible.builtin.set_fact:
            tang_sss_cfg: >-
              {%- set tang_list = [] -%}
              {%- for resp in clevis_tang_adv.results -%}
                {%- set _ = tang_list.append({'url': resp.item, 'adv': (resp.content | from_json)}) -%}
              {%- endfor -%}
              {{ {'t': 1, 'pins': {'tang': tang_list}} | to_json }}

        - name: "Show assembled SSS config"
          ansible.builtin.debug:
            var: tang_sss_cfg

        # --- Optional pool destruction ----------------------------------------
        - name: "Destroy existing pool (clevis_destroy_existing=true)"
          ansible.builtin.include_tasks: destroy-pool.yml
          when: clevis_destroy_existing | default(false) | bool
          vars:
            target_pool: "{{ clevis_pool_name }}"

        # --- Disk provisioning ------------------------------------------------
        - name: "Write temporary key file to remote host"
          ansible.builtin.copy:
            dest: /tmp/ansible_luks_key
            content: "{{ clevis_passphrase }}"
            owner: root
            group: root
            mode: '0600'

        - name: "Provision encryption on {{ item }}"
          ansible.builtin.include_tasks: provision-disk.yml
          loop: "{{ clevis_raw_disks }}"
          loop_control:
            loop_var: disk_device

        # --- ZFS pool and Proxmox registration --------------------------------
        - name: "Create ZFS pool and register with Proxmox"
          ansible.builtin.include_tasks: setup-pool.yml

      always:
        - name: "Remove temporary key from remote host"
          ansible.builtin.file:
            path: /tmp/ansible_luks_key
            state: absent
          when: not (clevis_keep_temp_key | default(false) | bool)

    # ── BLOCK: BOOT ORDERING ────────────────────────────────────────────────
    # Always runs — idempotent and safe on already-encrypted live systems.
    #
    # Applies the crypttab entries and systemd drop-ins that ensure disks are
    # unlocked before ZFS import on every boot.
    #
    # Can be run in isolation against an already-encrypted node:
    #   ansible-playbook ... --tags systemd

    - name: "Apply boot ordering configuration"
      tags: [systemd]
      block:

        # The IPv4-only network gate (gai.conf precedence + clevis-network-ready.service)
        # is handled by tasks/prestage.yml.  It is NOT re-run from this block;
        # operators using --tags systemd to re-apply boot ordering on an already-
        # provisioned node should combine with prestage if they also want the
        # network gate re-validated:  --tags prestage,systemd

        - name: "Configure crypttab and live discard for {{ item }}"
          ansible.builtin.include_tasks: configure-disk.yml
          loop: "{{ clevis_raw_disks }}"
          loop_control:
            loop_var: disk_device

        # ── clevis-luks-askpass network gate ───────────────────────────────
        # Disk-independent: written once here, not inside the per-disk loop.
        # Belt-and-suspenders: the clevis service will not attempt tang until
        # the network is fully online, regardless of crypttab ordering.

        - name: "Create systemd drop-in directory for clevis-luks-askpass"
          ansible.builtin.file:
            path: /etc/systemd/system/clevis-luks-askpass.service.d
            state: directory
            mode: '0755'
            owner: root
            group: root

        - name: "clevis-luks-askpass: wait for network-online before attempting Tang"
          ansible.builtin.copy:
            dest: /etc/systemd/system/clevis-luks-askpass.service.d/network-online.conf
            owner: root
            group: root
            mode: '0644'
            content: |
              [Unit]
              After=network-online.target
              Wants=network-online.target
          notify: "Reload systemd daemon"

        # ── ZFS import ordering ────────────────────────────────────────────
        # Problem: remote-cryptsetup.target with nofail is satisfied as soon
        # as crypt units START, not when they COMPLETE.  Using it as an After=
        # anchor lets ZFS import race ahead of still-unlocking disks.
        #
        # Fix: anchor each ZFS import unit on the individual per-disk
        # systemd-cryptsetup@ service units.  Those units complete only when
        # the device is either open or has timed out — the mapper device
        # exists before the service transitions to 'active' or 'failed'.
        #
        # ConditionPathExists= guards: if any mapper is still absent after
        # all crypt units have run (genuine hardware failure or Tang timeout
        # with no persistent key), the ZFS import unit is SKIPPED rather than
        # importing a degraded pool.  The node boots to multi-user.target
        # without ZFS, keeping it accessible for operator intervention.
        #
        # Three units are covered:
        #   zfs-import-cache   — when /etc/zfs/zpool.cache is populated
        #   zfs-import-scan    — fallback full-device scan (cache absent/empty)
        #   zfs-import@        — Proxmox per-pool template unit
        #
        # All three receive identical drop-ins so the correct unit runs
        # regardless of which import path systemd picks.

        - name: "Create systemd drop-in directories for ZFS import units"
          ansible.builtin.file:
            path: "/etc/systemd/system/{{ item }}.d"
            state: directory
            mode: '0755'
            owner: root
            group: root
          loop:
            - zfs-import-cache.service
            - zfs-import-scan.service
            - zfs-import@.service

        - name: "ZFS import units: wait for individual LUKS mappers, skip if any absent"
          ansible.builtin.copy:
            dest: "/etc/systemd/system/{{ item }}.d/after-luks-unlock.conf"
            owner: root
            group: root
            mode: '0644'
            content: |
              [Unit]
              # Wait for every individual LUKS device service to complete (open or
              # timed out) before attempting pool import.  remote-cryptsetup.target
              # with nofail is satisfied when units START, not complete — it cannot
              # reliably gate ZFS import.
              #
              # ConditionPathExists= lines: if any mapper device is absent after all
              # crypt units have run, this unit is skipped rather than importing the
              # pool with missing members.  The node remains accessible but ZFS is not
              # mounted — no silent degraded imports.
              {% for disk in clevis_raw_disks %}
              After=systemd-cryptsetup@crypt-{{ disk }}.service
              {% endfor %}
              {% for disk in clevis_raw_disks %}
              ConditionPathExists=/dev/mapper/crypt-{{ disk }}
              {% endfor %}
          loop:
            - zfs-import-cache.service
            - zfs-import-scan.service
            - zfs-import@.service
          notify: "Reload systemd daemon"

        - name: "Enable clevis-luks-askpass.path for late-boot unlock"
          ansible.builtin.systemd:
            name: clevis-luks-askpass.path
            enabled: true
            state: started
          ignore_errors: "{{ ansible_check_mode }}"

        - name: "Flush handlers (daemon_reload) before continuing"
          ansible.builtin.meta: flush_handlers
