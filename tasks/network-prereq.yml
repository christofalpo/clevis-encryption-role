---
# Deploys (or removes) the IPv4-only preference for Clevis Tang connections.
#
# PURPOSE
# -------
# On dual-stack hosts (e.g. Hetzner), getaddrinfo() returns AAAA records
# before A records by default.  Even with net.ipv6.conf.all.disable_ipv6=1
# in /etc/sysctl.d/, the sysctl only prevents new IPv6 addresses being
# assigned — it does NOT remove addresses that were already configured before
# systemd-sysctl.service ran.  On Hetzner nodes the public IPv6 address is
# assigned by ifupdown before any sysctl is applied, so IPv6 remains fully
# functional and getaddrinfo() still resolves AAAA records first.
#
# The correct fix is /etc/gai.conf: setting a higher precedence for
# IPv4-mapped addresses (::ffff:0:0/96) makes getaddrinfo() return A records
# before AAAA records for every application on the host — clevis, curl, and
# anything else — without requiring IPv6 to be disabled at the kernel level.
#
# DESIGN
# ------
# Controlled by clevis_ipv4_only (defaults to false).  When false, any
# previously deployed configuration is removed so the role stays idempotent.
#
# The clevis-network-ready.service gate is retained for boot ordering
# (After=network-online.target, Before=clevis-luks-askpass.service) but its
# ExecStart now verifies the gai.conf preference is in place rather than
# checking the disable_ipv6 sysctl value, which proved insufficient.
#
# A separate drop-in file (ipv4-only.conf) is written to the
# clevis-luks-askpass.service.d directory rather than modifying the existing
# network-online.conf — keeping concerns separated and making the gate purely
# additive.
#
# Called from the boot-ordering block in tasks/main.yml, after the per-disk
# configure-disk.yml loop (which creates the drop-in directory).

- name: "Deploy IPv4-only preference for Clevis"
  when: clevis_ipv4_only | default(false) | bool
  block:

    - name: "Prefer IPv4 over IPv6 in getaddrinfo (gai.conf)"
      # Two lines are required — raising IPv4-mapped alone is not sufficient:
      # glibc may fall back to a built-in default of 40 for ::/0 (native IPv6),
      # and RFC 6724 Rule 5 (prefer matching label) can still favour IPv6 before
      # Rule 6 (precedence) is even reached.  Explicitly setting ::/0 to 1
      # ensures native IPv6 addresses lose to IPv4-mapped (100) at Rule 6
      # regardless of which path the glibc sort takes.
      ansible.builtin.blockinfile:
        path: /etc/gai.conf
        block: |
          precedence ::ffff:0:0/96  100
          precedence ::/0           1
        marker: "# {mark} ANSIBLE MANAGED clevis-encryption ipv4-only"
        create: true
        owner: root
        group: root
        mode: '0644'

    - name: "Install clevis-network-ready.service"
      ansible.builtin.copy:
        dest: /etc/systemd/system/clevis-network-ready.service
        owner: root
        group: root
        mode: '0644'
        content: |
          # Managed by Ansible role: clevis_encryption — https://github.com/KvalitetsIT/clevis-encryption-role
          # Do not edit by hand; regenerated on each role run.
          [Unit]
          Description=Verify IPv4-is-preferred before Clevis Tang unlock requests
          Documentation=man:gai.conf(5) man:clevis-luks-askpass(8)
          # Run after the network stack is fully online so that any late
          # interface configuration has settled before clevis starts.
          After=network-online.target
          Wants=network-online.target
          # Ordering: this unit must complete before clevis-luks-askpass starts.
          Before=clevis-luks-askpass.service

          [Service]
          Type=oneshot
          RemainAfterExit=yes
          # Two independent checks — both must pass before clevis is allowed
          # to start making Tang requests.  With Type=oneshot, multiple
          # ExecStart lines run in order and the service fails on the first
          # non-zero exit, so each check is expressed separately for clarity.
          #
          # Check 1: disable_ipv6 sysctl confirms the kernel will not assign
          # new IPv6 addresses to interfaces going forward.
          ExecStart=/bin/sh -c 'sysctl -n net.ipv6.conf.all.disable_ipv6 | grep -qx 1'
          # Check 2: gai.conf IPv4 precedence confirms that getaddrinfo()
          # returns A records before AAAA records.  This is the effective
          # guard on dual-stack Hetzner hosts where the IPv6 address is
          # assigned before systemd-sysctl.service runs and therefore remains
          # active regardless of the sysctl value — without this preference
          # clevis resolves Tang hostnames to IPv6 first and connects to Tang
          # servers that may only accept IPv4 clients.
          ExecStart=grep -q "^precedence[[:space:]]*::ffff:0:0/96[[:space:]]*100" /etc/gai.conf

          [Install]
          # Pulled in automatically when clevis-luks-askpass.service is enabled.
          WantedBy=clevis-luks-askpass.service
      notify: "Reload systemd daemon"

    - name: "Enable clevis-network-ready.service"
      ansible.builtin.systemd:
        name: clevis-network-ready.service
        enabled: true
        # daemon_reload: true — the service file was just written above; without
        # reloading, systemd does not yet know the unit exists and the enable
        # call fails with "Could not find the requested service".
        daemon_reload: true
      ignore_errors: "{{ ansible_check_mode }}"

    - name: "Ensure clevis-luks-askpass.service.d drop-in directory exists"
      # When network-prereq runs as part of prestage (PR #10), this fires
      # before the boot-ordering block that also creates this directory.
      # On hosts that have never had clevis drop-ins before, the ipv4-only.conf
      # write below would fail with "Destination directory … does not exist".
      # Idempotent — also safe when the boot-ordering block creates it later.
      ansible.builtin.file:
        path: /etc/systemd/system/clevis-luks-askpass.service.d
        state: directory
        mode: '0755'
        owner: root
        group: root

    - name: "Add clevis-luks-askpass drop-in: require network gate"
      # Separate drop-in file so it can be removed independently of the
      # network-online.conf ordering that configure-disk.yml manages.
      ansible.builtin.copy:
        dest: /etc/systemd/system/clevis-luks-askpass.service.d/ipv4-only.conf
        owner: root
        group: root
        mode: '0644'
        content: |
          # Managed by Ansible role: clevis_encryption — https://github.com/KvalitetsIT/clevis-encryption-role
          # Do not edit by hand; regenerated on each role run.
          [Unit]
          # Block unlock attempts until clevis-network-ready has confirmed that
          # the IPv4 preference is in place.
          After=clevis-network-ready.service
          Wants=clevis-network-ready.service
      notify: "Reload systemd daemon"

- name: "Remove IPv4-only preference (clevis_ipv4_only is false)"
  when: not (clevis_ipv4_only | default(false) | bool)
  block:

    - name: "Remove IPv4-only precedence block from gai.conf if present"
      ansible.builtin.blockinfile:
        path: /etc/gai.conf
        marker: "# {mark} ANSIBLE MANAGED clevis-encryption ipv4-only"
        state: absent

    - name: "Remove clevis-network-ready.service if present"
      ansible.builtin.file:
        path: /etc/systemd/system/clevis-network-ready.service
        state: absent
      notify: "Reload systemd daemon"

    - name: "Remove ipv4-only drop-in from clevis-luks-askpass if present"
      ansible.builtin.file:
        path: /etc/systemd/system/clevis-luks-askpass.service.d/ipv4-only.conf
        state: absent
      notify: "Reload systemd daemon"
