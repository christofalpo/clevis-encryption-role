---
# Pins the IP family that clevis's curl uses for Tang connections, by writing a
# clevis-scoped curlrc and pointing curl at it via CURL_HOME (clevis_curl_home).
#
# WHY A CURLRC (and not gai.conf)
# -------------------------------
# clevis-encrypt-tang and clevis-decrypt-tang both call `curl -sfg …` WITHOUT
# -q/--disable, so curl reads its config file.  curl resolves that file as
# $CURL_HOME/.curlrc → $XDG_CONFIG_HOME/curlrc → $HOME/.curlrc.  By exporting
# CURL_HOME wherever the role drives clevis (provision-disk bind, rotate regen,
# and the boot-time clevis-unlock-data script) we scope the IP-family pin to
# clevis ALONE — unlike the previous /etc/gai.conf + disable_ipv6 approach which
# was host-global AND silently bypassed by systemd-resolved.
#
# WHY PIN A FAMILY AT ALL
# -----------------------
# curl's Happy Eyeballs races v4 and v6 at the TCP layer and commits to whichever
# connects first; it never reconsiders based on the HTTP status.  If a Tang LB
# answers the IPv6 handshake but returns 403 to non-whitelisted clients, curl
# "wins" on IPv6 and then fails even though IPv4 would have returned the adv.
# So the family that yields a VALID advertisement must be selected explicitly.
#
# Controlled by clevis_curl_ip_version (auto|ipv4|ipv6|dual); see defaults.
# Called from tasks/prestage.yml (after package install + DNS config), so the
# probe resolves Tang names through the same resolver the booted system uses.

- name: "Validate clevis_curl_ip_version"
  ansible.builtin.assert:
    that: (clevis_curl_ip_version | default('auto')) in ['auto', 'ipv4', 'ipv6', 'dual']
    fail_msg: "clevis_curl_ip_version must be one of: auto, ipv4, ipv6, dual"
    quiet: true

# Honour the deprecated clevis_ipv4_only flag: only when the new variable is left
# at its 'auto' default does an explicit clevis_ipv4_only=true map to ipv4.
- name: "Resolve effective clevis curl IP-family mode"
  ansible.builtin.set_fact:
    _clevis_curl_mode: >-
      {{ clevis_curl_ip_version
         if (clevis_curl_ip_version | default('auto')) != 'auto'
         else ('ipv4' if (clevis_ipv4_only | default(false) | bool) else 'auto') }}

- name: "Warn that clevis_ipv4_only is deprecated"
  ansible.builtin.debug:
    msg: >-
      DEPRECATION: clevis_ipv4_only is superseded by clevis_curl_ip_version and
      was mapped to clevis_curl_ip_version=ipv4. Set clevis_curl_ip_version
      explicitly (auto|ipv4|ipv6|dual) and remove clevis_ipv4_only.
  when:
    - clevis_ipv4_only | default(false) | bool
    - (clevis_curl_ip_version | default('auto')) == 'auto'

# ── Detect the working IP family (auto mode only) ────────────────────────────
- name: "Probe Tang /adv reachability per IP family (auto mode)"
  # Probes with the SAME tool and flags clevis will use (curl -fg --ipvN), so the
  # result reflects what clevis actually experiences — including an L7 reject that
  # a bare TCP probe would miss (-f makes any non-2xx, e.g. 403, a failure).
  # Emits ipv4 | ipv6 | dual | unknown on stdout; per-server diagnostics on stderr.
  # Never hard-fails: if NOTHING is reachable it emits `unknown` and warns —
  # the write step then PRESERVES any existing pin (so a transient Tang outage
  # during a routine re-run can't clobber a known-good family) and the real,
  # loud failure comes from the actual bind/unlock step, which is the correct
  # place to fail (this also keeps boot-ordering-only / CI runs green).
  ansible.builtin.shell:
    executable: /bin/bash
    cmd: |
      set -uo pipefail
      ct={{ clevis_curl_probe_connect_timeout | int }}
      mt={{ clevis_curl_probe_max_time | int }}
      v4=0; v6=0; total=0
      for url in {{ tang_servers | map(attribute='url') | map('quote') | join(' ') }}; do
        total=$((total + 1))
        if curl -sfg --ipv4 --connect-timeout "$ct" --max-time "$mt" -o /dev/null "$url/adv"; then
          v4=$((v4 + 1)); echo "probe: $url -> IPv4 OK" >&2
        else
          echo "probe: $url -> IPv4 FAIL" >&2
        fi
        if curl -sfg --ipv6 --connect-timeout "$ct" --max-time "$mt" -o /dev/null "$url/adv"; then
          v6=$((v6 + 1)); echo "probe: $url -> IPv6 OK" >&2
        else
          echo "probe: $url -> IPv6 FAIL" >&2
        fi
      done
      echo "probe: summary reachable v4=$v4 v6=$v6 of total=$total" >&2
      if [ "$v4" -eq 0 ] && [ "$v6" -eq 0 ]; then
        echo "probe: WARNING no Tang server reachable over IPv4 or IPv6; keeping any existing pin (else dual)" >&2
        echo unknown
      elif [ "$v4" -eq "$total" ] && [ "$v6" -eq "$total" ]; then
        echo dual
      elif [ "$v4" -ge "$v6" ]; then
        echo ipv4
      else
        echo ipv6
      fi
  register: _clevis_curl_probe
  changed_when: false
  check_mode: false
  when: _clevis_curl_mode == 'auto'

- name: "Select clevis curl IP family (probe result in auto, else explicit)"
  ansible.builtin.set_fact:
    clevis_curl_family: >-
      {{ (_clevis_curl_probe.stdout | trim)
         if _clevis_curl_mode == 'auto'
         else _clevis_curl_mode }}

- name: "Show the selected clevis curl IP family"
  ansible.builtin.debug:
    msg: "clevis Tang curl IP family = {{ clevis_curl_family }} (mode={{ _clevis_curl_mode }})"

# ── Write the clevis-scoped curlrc ───────────────────────────────────────────
- name: "Ensure CURL_HOME directory exists for clevis"
  ansible.builtin.file:
    path: "{{ clevis_curl_home }}"
    state: directory
    owner: root
    group: root
    mode: '0755'

- name: "Check for an existing clevis curlrc"
  ansible.builtin.stat:
    path: "{{ clevis_curl_home }}/.curlrc"
  register: _clevis_curlrc_stat

# 'unknown' (auto probe found nothing reachable) is treated as 'dual' ONLY when
# no curlrc exists yet; when one exists it is preserved (write step is skipped),
# so a transient Tang outage can't downgrade a known-good pin.
- name: "Resolve the effective curlrc family + flag"
  ansible.builtin.set_fact:
    _clevis_curlrc_family: "{{ 'dual' if clevis_curl_family == 'unknown' else clevis_curl_family }}"
    _clevis_curlrc_flag: >-
      {{ '--ipv4' if clevis_curl_family == 'ipv4'
         else ('--ipv6' if clevis_curl_family == 'ipv6' else '') }}

- name: "Preserve existing curlrc (Tang unreachable; pin left unchanged)"
  ansible.builtin.debug:
    msg: >-
      No Tang reachable over either family and a curlrc already exists at
      {{ clevis_curl_home }}/.curlrc — leaving the current pin unchanged.
  when:
    - clevis_curl_family == 'unknown'
    - _clevis_curlrc_stat.stat.exists

- name: "Write clevis curlrc (IP family: {{ _clevis_curlrc_family }})"
  # Skipped only when the probe found nothing reachable AND a curlrc already
  # exists — see the preserve note above.
  when: clevis_curl_family != 'unknown' or not _clevis_curlrc_stat.stat.exists
  ansible.builtin.copy:
    dest: "{{ clevis_curl_home }}/.curlrc"
    owner: root
    group: root
    mode: '0644'
    content: |
      # Managed by Ansible role: clevis_encryption — https://github.com/KvalitetsIT/clevis-encryption-role
      # Do not edit by hand; regenerated on each role run.
      #
      # Read by curl via CURL_HOME={{ clevis_curl_home }} for every Tang request
      # clevis makes: the advertisement fetch at bind and the recovery POST at
      # unlock.  Pins the IP family so Happy Eyeballs cannot commit to a family
      # whose Tang answers the TCP handshake but rejects the request at L7.
      # Selected IP family: {{ _clevis_curlrc_family }}
      {{ _clevis_curlrc_flag }}

# NOTE: the legacy host-global IPv4-only gate that this curlrc supersedes
# (gai.conf precedence block, clevis-network-ready.service + its drop-in, the
# 99-ipv6_disable.conf sysctl) is retired by tasks/cleanup-legacy.yml, which runs
# first from main.yml — not here, so this file is purely the desired-state pin.
