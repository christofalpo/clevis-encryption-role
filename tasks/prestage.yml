---
# Pre-stageable tasks: package installation and network preconditions for Tang.
#
# All idempotent and safe on un-encrypted nodes — none of these tasks touch
# LUKS state.  Designed so the heavy provisioning step (LUKS format + Clevis
# bind) can happen in a tighter maintenance window with most of the setup
# already in place.
#
# Tag: prestage
#   Run on its own with:
#     ansible-playbook playbook.yml --tags prestage
#   Also runs as part of the full role (no tag filter), so a normal first-run
#   invocation produces the same end state as prestage + (full run later).
#
# Idempotency:
#   - apt: state=present, no-op when packages are already installed
#   - blockinfile: managed nameservers live between markers, replaced (not
#     appended) on changes — fixes the CRLF-in-resolv.conf accumulation bug
#   - network-prereq.yml: probe + copy/file modules, all idempotent
#   (Removal of stale artifacts from older versions lives in
#    tasks/cleanup-legacy.yml, included first from main.yml.)

- name: "Install required encryption packages"
  ansible.builtin.apt:
    name:
      - clevis
      - clevis-luks
      - clevis-systemd
      - cryptsetup
      - systemd-cryptsetup
      - util-linux
      - clevis-initramfs
      # curl is what clevis-{encrypt,decrypt}-tang shell out to for Tang; the
      # auto IP-family probe in network-prereq.yml uses the same binary.
      - curl
    state: present
    update_cache: true

# NOTE: this role is NBDE-only — it installs no storage/filesystem packages. The
# ZFS/btrfs/LVM userland belongs to the downstream storage consumer role
# (e.g. proxmox_encrypted_storage / encrypted_storage_pool).

# NOTE: the old host-global IPv6 disable (/etc/sysctl.d/99-ipv6_disable.conf) and
# the gai.conf IPv4-only gate are now removed by tasks/cleanup-legacy.yml, which
# runs first (see main.yml) — so by this point IPv6 is back up on the live kernel
# and the network-prereq probe below can use it.

- name: "Detect managed-nameserver block markers in /etc/resolv.conf"
  # Used by the cleanup step below to decide whether this host still carries
  # legacy duplicates from before this task switched to blockinfile.
  # grep -c returns rc=1 on no matches and rc=2 on missing file — both are
  # treated as "no markers present" via failed_when: false + default('0').
  ansible.builtin.shell: |
    grep -c '^# BEGIN ANSIBLE MANAGED clevis-encryption nameservers' /etc/resolv.conf 2>/dev/null
  register: _ns_block_marker
  changed_when: false
  failed_when: false
  check_mode: false
  when: clevis_dns_servers | length > 0

- name: "One-time cleanup: strip pre-existing duplicates of managed nameservers"
  # The old task used lineinfile per server.  On hosts with CRLF line endings
  # in /etc/resolv.conf (e.g. those installed by the Hetzner installimage),
  # lineinfile's exact-match check fails across the trailing \r and a fresh
  # 'nameserver X.Y.Z.W' line was appended on every run — silently growing
  # the file each time the playbook executed.
  #
  # This task fires ONLY when the new blockinfile marker is not yet present
  # on the host — i.e. the first run after this fix lands.  It uses lineinfile
  # state=absent which removes EVERY matching line, not just the first one.
  # On hosts that have always been clean (or after the fix takes effect),
  # the marker exists and this step is skipped.
  ansible.builtin.lineinfile:
    path: /etc/resolv.conf
    line: "nameserver {{ item }}"
    state: absent
  loop: "{{ clevis_dns_servers }}"
  when:
    - clevis_dns_servers | length > 0
    - (_ns_block_marker.stdout | default('0') | int) == 0

- name: "Insert managed nameservers as a single ANSIBLE-marked block"
  # blockinfile is naturally idempotent: subsequent runs locate the BEGIN/END
  # markers and replace the content between them if it has drifted, rather
  # than appending.
  #
  # Placement: insertbefore: BOF puts the block at the very top of the file
  # so the managed nameservers are queried FIRST by the resolver — required
  # so Tang hostnames resolve through the internal DNS rather than via the
  # Hetzner upstream that doesn't know our internal zones.  BOF is also the
  # only robust choice with blockinfile: the regex-based insertbefore matches
  # the LAST occurrence (no firstmatch option on this module), which would
  # place our block AFTER any pre-existing nameservers — defeating the
  # purpose.  The Hetzner header comment is pushed down a few lines as a
  # cosmetic side effect, which the resolver does not care about.
  ansible.builtin.blockinfile:
    path: /etc/resolv.conf
    block: |
      {% for ns in clevis_dns_servers | shuffle(seed=inventory_hostname) %}
      nameserver {{ ns }}
      {% endfor %}
    marker: "# {mark} ANSIBLE MANAGED clevis-encryption nameservers"
    insertbefore: BOF
  when: clevis_dns_servers | length > 0

- name: "Pin clevis Tang IP family via curlrc (and retire the legacy gai.conf gate)"
  # network-prereq.yml selects the IP family (auto-probe or explicit) and writes
  # the clevis-scoped curlrc under clevis_curl_home, then removes the old
  # gai.conf precedence block and clevis-network-ready.service.  Idempotent.
  ansible.builtin.include_tasks: network-prereq.yml
