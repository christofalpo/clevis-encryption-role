---
# Replaces a failed encrypted disk in the ZFS pool.
#
# The operator physically swaps the dead drive, then runs this with the failed
# pool member and the new bare device name.  We provision the new device with
# LUKS2 + Clevis/Tang (reusing provision-disk.yml), `zpool replace` to start the
# resilver, write its crypttab entry (configure-disk.yml), and refresh the
# disk-set boot-ordering drop-ins so they reflect the new member set.
#
# Inputs (operator-supplied, no defaults):
#   clevis_replace_old        failed member exactly as `zpool status` shows it
#                             (e.g. /dev/mapper/crypt-nvme2n1, crypt-nvme2n1, or a GUID)
#   clevis_replace_new        new bare device name (e.g. nvme2n1)
# Optional:
#   clevis_replace_old_device old bare device name for crypttab cleanup; auto-
#                             derived from clevis_replace_old when it is a
#                             crypt-* mapper, so only needed when old is a GUID.
#
# Reuses: load-recovery-key.yml, tang-adv.yml, provision-disk.yml,
#         configure-disk.yml, boot-ordering-dropins.yml.
#
# Resilver is started but NOT waited on (can take hours); zpool status is shown.

- name: "Replace disk | validate inputs"
  ansible.builtin.assert:
    that:
      - clevis_replace_old is defined and (clevis_replace_old | string | length > 0)
      - clevis_replace_new is defined and (clevis_replace_new | string | length > 0)
    fail_msg: >-
      replace-disk requires clevis_replace_old (failed member as `zpool status`
      shows it) and clevis_replace_new (new bare device, e.g. nvme2n1).

- name: "Replace disk | confirm the pool exists"
  ansible.builtin.command: "zpool list {{ clevis_pool_name }}"
  register: _rp_pool
  changed_when: false
  failed_when: _rp_pool.rc != 0

- name: "Replace disk | check the new device is not already a pool member"
  ansible.builtin.shell:
    cmd: |
      set -o pipefail
      zpool status -P {{ clevis_pool_name }} | grep -q "crypt-{{ clevis_replace_new }}\b"
    executable: /bin/bash
  register: _rp_new_inuse
  changed_when: false
  failed_when: false
  check_mode: false

- name: "Replace disk | abort — new device already in the pool"
  ansible.builtin.fail:
    msg: "crypt-{{ clevis_replace_new }} is already a member of pool {{ clevis_pool_name }}."
  when: _rp_new_inuse.rc == 0

- name: "Replace disk | provision new device, replace, reconfigure boot ordering"
  block:
    - name: "Replace disk | load recovery key onto the host"
      ansible.builtin.include_tasks: load-recovery-key.yml

    - name: "Replace disk | fetch Tang advertisements (assemble SSS config)"
      ansible.builtin.include_tasks: tang-adv.yml

    - name: "Replace disk | LUKS-format + Clevis-bind + open the new device"
      ansible.builtin.include_tasks: provision-disk.yml
      vars:
        disk_device: "{{ clevis_replace_new }}"

    - name: "Replace disk | zpool replace the failed member with crypt-{{ clevis_replace_new }}"
      ansible.builtin.command: >-
        zpool replace {{ clevis_pool_name }}
        {{ clevis_replace_old }}
        /dev/mapper/crypt-{{ clevis_replace_new }}
      register: _rp_replace
      changed_when: true

    - name: "Replace disk | write crypttab entry + live discard for the new device"
      ansible.builtin.include_tasks: configure-disk.yml
      vars:
        disk_device: "{{ clevis_replace_new }}"

    - name: "Replace disk | derive the old device name for crypttab cleanup"
      # Strip everything up to and including 'crypt-' to get the bare device
      # name.  Avoid a '\1' backreference: Jinja parses '\1' in a string literal
      # as chr(1), not a regex group (the bug that broke setup-pool's vdev spec).
      # When clevis_replace_old is a GUID (no 'crypt-'), there is no name to
      # clean up, so resolve to '' and skip the removal task below.
      ansible.builtin.set_fact:
        _rp_old_device: >-
          {{ clevis_replace_old_device
             | default(
                 (clevis_replace_old | regex_replace('^.*crypt-', '')) if ('crypt-' in clevis_replace_old) else '',
                 true) }}

    - name: "Replace disk | remove stale crypttab entry for the old device"
      ansible.builtin.lineinfile:
        path: /etc/crypttab
        regexp: "^crypt-{{ _rp_old_device }}\\s"
        state: absent
      when: (_rp_old_device | length > 0) and (_rp_old_device != clevis_replace_new)
      notify: "Rebuild initramfs"

    - name: "Replace disk | re-derive the live disk set from crypt-* mappers"
      ansible.builtin.shell:
        cmd: |
          set -o pipefail
          ls -1 /dev/mapper/ | grep '^crypt-' | sed 's/^crypt-//' | sort
        executable: /bin/bash
      register: _rp_live_mappers
      changed_when: false
      check_mode: false

    - name: "Replace disk | update clevis_raw_disks to the live mapper set"
      ansible.builtin.set_fact:
        clevis_raw_disks: "{{ _rp_live_mappers.stdout_lines }}"

    - name: "Replace disk | refresh disk-set systemd boot-ordering drop-ins"
      # after-luks-unlock.conf gates pool import on each member's mapper via
      # ConditionPathExists; refreshing it drops the removed disk and adds the
      # new one so import is not blocked by a now-absent mapper.
      ansible.builtin.include_tasks: boot-ordering-dropins.yml

    - name: "Replace disk | show pool status (resilver runs in the background)"
      ansible.builtin.command: "zpool status {{ clevis_pool_name }}"
      register: _rp_status
      changed_when: false

    - name: "Replace disk | report"
      ansible.builtin.debug:
        msg: "{{ _rp_status.stdout_lines }}"

  always:
    - name: "Replace disk | remove temporary key from the host"
      ansible.builtin.file:
        path: /tmp/ansible_luks_key
        state: absent
      when: not (clevis_keep_temp_key | default(false) | bool)
