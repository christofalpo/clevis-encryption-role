---
# The encrypted-storage import chain (the ZFS CONSUMER half of the boot ordering).
#
# Included from boot-ordering-dropins.yml ONLY when clevis_deploy_storage_units is
# true (the default). Set it false when a separate storage-pool role (e.g.
# proxmox_encrypted_storage) owns these units, so clevis and that role don't both
# write them. Clevis always deploys the UNLOCK half + the public
# clevis-luks-unlocked.target seam (in boot-ordering-dropins.yml); this file is the
# part that a downstream consumer takes over.
#
# FAIL-DEGRADED, and DECOUPLED from the stock early zfs-import machinery — see the
# design rationale in boot-ordering-dropins.yml.

# ── 2. Late, decoupled pool import ──────────────────────────────────────────
- name: "Deploy encrypted-storage import script"
  ansible.builtin.template:
    src: encrypted-storage-import.sh.j2
    dest: /usr/local/sbin/encrypted-storage-import
    owner: root
    group: root
    mode: '0755'

- name: "Deploy encrypted-storage-import.service"
  ansible.builtin.copy:
    dest: /etc/systemd/system/encrypted-storage-import.service
    owner: root
    group: root
    mode: '0644'
    content: |
      # Managed by Ansible role: clevis_encryption — https://github.com/KvalitetsIT/clevis-encryption-role
      # Do not edit by hand; regenerated on each role run.
      [Unit]
      Description=Import the encrypted ZFS data pool ({{ clevis_pool_name }})
      Requires=clevis-unlock-data.service
      # Order after the PUBLIC unlock sync point (clevis-luks-unlocked.target),
      # not just the internal service — this is the seam a split-out storage-pool
      # role will use verbatim. Keeps the direct service Requires as belt-and-braces.
      After=clevis-unlock-data.service clevis-luks-unlocked.target network-online.target
      # Deliberately NOT Before=zfs-import.target/zfs-mount.service/local-fs.target
      # — that decoupling is what prevents the ordering cycle.

      [Service]
      Type=oneshot
      RemainAfterExit=yes
      ExecStart=/usr/local/sbin/encrypted-storage-import
  notify: "Reload systemd daemon"

# ── 3. Pool-health viability gate ───────────────────────────────────────────
- name: "Deploy encrypted-storage pool-health check script"
  ansible.builtin.template:
    src: encrypted-storage-pool-check.sh.j2
    dest: /usr/local/sbin/encrypted-storage-pool-check
    owner: root
    group: root
    mode: '0755'

- name: "Deploy encrypted-storage-pool-check.service"
  ansible.builtin.copy:
    dest: /etc/systemd/system/encrypted-storage-pool-check.service
    owner: root
    group: root
    mode: '0644'
    content: |
      # Managed by Ansible role: clevis_encryption — https://github.com/KvalitetsIT/clevis-encryption-role
      # Do not edit by hand; regenerated on each role run.
      [Unit]
      Description=Verify encrypted ZFS pool {{ clevis_pool_name }} imported and usable
      Requires=encrypted-storage-import.service
      After=encrypted-storage-import.service

      [Service]
      Type=oneshot
      RemainAfterExit=yes
      # ONLINE or DEGRADED -> usable; absent / FAULTED / UNAVAIL -> exit 1 so the
      # barrier is NOT reached and the Proxmox daemons stay stopped.
      ExecStart=/usr/local/sbin/encrypted-storage-pool-check
  notify: "Reload systemd daemon"

# ── 4. The synchronization barrier ──────────────────────────────────────────
- name: "Deploy encrypted-storage-ready.target (synchronization barrier)"
  ansible.builtin.copy:
    dest: /etc/systemd/system/encrypted-storage-ready.target
    owner: root
    group: root
    mode: '0644'
    content: |
      # Managed by Ansible role: clevis_encryption — https://github.com/KvalitetsIT/clevis-encryption-role
      # Do not edit by hand; regenerated on each role run.
      [Unit]
      Description=Encrypted ZFS Storage Synchronization Barrier
      Documentation=man:systemd.special(7)
      Requires=encrypted-storage-pool-check.service
      After=encrypted-storage-pool-check.service

      [Install]
      WantedBy=multi-user.target
  notify: "Reload systemd daemon"

# NOTE: the obsolete ZFS-import ordering drop-ins from earlier designs
# (zfs-import-{cache,scan}.service.d/{override,after-luks-unlock}.conf and
# zfs-import@.service.d/after-luks-unlock.conf — the source of the boot ordering
# cycle) are removed by tasks/cleanup-legacy.yml.  They live in foreign service
# drop-in dirs (and 'override.conf' is a generic name), so cleanup removes them
# only when their content proves this role wrote them — not by a blind delete.

# ── Leave the stock zfs-import units at the Proxmox default ─────────────────
# (cache enabled, scan disabled).  With cachefile=none the data pool is not in
# the cache, so the early cache import no-ops; our late chain imports it.
#
# Only touch units that actually exist: when ZFS is not installed on this node
# (clevis_install_zfs_packages=false, or ZFS owned by a separate role that has
# not run yet) the zfs-import units are absent, and enabling a non-existent unit
# would hard-fail.  Restoring "Proxmox defaults" is meaningless without them, so
# skip cleanly in that case.
- name: "Detect the stock zfs-import units"  # noqa: command-instead-of-module
  # The systemd module can enable/disable a unit but cannot LIST/detect which
  # unit files exist, so query systemctl directly (read-only).
  ansible.builtin.command: systemctl list-unit-files zfs-import-cache.service zfs-import-scan.service
  register: _zfs_import_units
  changed_when: false
  failed_when: false
  check_mode: false

- name: "Restore Proxmox-default ZFS import units"
  ansible.builtin.systemd:
    name: "{{ item.unit }}"
    enabled: "{{ item.enabled }}"
  loop:
    - { unit: zfs-import-cache.service, enabled: true }
    - { unit: zfs-import-scan.service, enabled: false }
  when: item.unit in (_zfs_import_units.stdout | default(''))
  ignore_errors: "{{ ansible_check_mode }}"

- name: "Enable the encrypted-storage barrier"
  ansible.builtin.systemd:
    name: encrypted-storage-ready.target
    enabled: true
  ignore_errors: "{{ ansible_check_mode }}"
