---
# Post-install validator for the encrypted-storage boot ordering.  Runs at the
# end of the role (after ensure-pool) so the install FAILS LOUDLY rather than
# reporting success while leaving a node that won't bring its pool up at boot.
#
# Catches the two failure modes that otherwise only surface after a reboot:
#   1. a systemd ORDERING CYCLE in the boot chain — systemd silently deletes a
#      job to break it (it deleted clevis-unlock-data once), so nothing decrypts;
#   2. the pool not actually imported / usable after provisioning.
#
# Skipped when clevis_ensure_pool is false (e.g. the Molecule container, which
# has no real ZFS/systemd boot to validate).

- name: "Verify | systemd-analyze the encrypted-storage boot chain"
  ansible.builtin.command: >-
    systemd-analyze verify
    encrypted-storage-ready.target
    clevis-unlock-data.service
    clevis-luks-unlocked.target
    encrypted-storage-import.service
    encrypted-storage-pool-check.service
  register: _clevis_boot_verify
  changed_when: false
  failed_when: false
  check_mode: false

- name: "Verify | show systemd-analyze output"
  ansible.builtin.debug:
    var: _clevis_boot_verify.stderr_lines

- name: "Verify | FAIL on a systemd ordering cycle in the boot chain"
  ansible.builtin.fail:
    msg: >-
      systemd found an ORDERING CYCLE in the encrypted-storage boot chain — a job
      would be deleted to break it and the pool would not decrypt at boot. Fix the
      unit ordering before rebooting. systemd-analyze said:
      {{ _clevis_boot_verify.stderr | default('') }}
  when: >-
    'ordering cycle' in
    (((_clevis_boot_verify.stdout | default('')) ~ (_clevis_boot_verify.stderr | default(''))) | lower)

- name: "Verify | read live ZFS pool health: {{ clevis_pool_name }}"
  ansible.builtin.command: "zpool list -H -o health {{ clevis_pool_name }}"
  register: _clevis_pool_health
  changed_when: false
  failed_when: false
  check_mode: false

- name: "Verify | collect diagnostics when the pool is not usable"
  ansible.builtin.command: "{{ item }}"
  loop:
    - "zpool status {{ clevis_pool_name }}"
    - "ls -1 /dev/mapper/"
  register: _clevis_pool_diag
  changed_when: false
  failed_when: false
  check_mode: false
  when: (_clevis_pool_health.stdout | default('') | trim) not in ['ONLINE', 'DEGRADED']

- name: "Verify | FAIL if the pool is not imported / not usable"
  ansible.builtin.fail:
    msg: >-
      Pool '{{ clevis_pool_name }}' is not imported or not usable (health:
      '{{ _clevis_pool_health.stdout | default('') | trim or 'absent' }}'). The
      disks likely did not decrypt (check clevis-unlock-data / Tang reachability)
      or are not LUKS-provisioned. Diagnostics:
      {{ _clevis_pool_diag.results | default([]) | map(attribute='stdout', default='') | list }}
  when: (_clevis_pool_health.stdout | default('') | trim) not in ['ONLINE', 'DEGRADED']
